    if (sbStardustTrail.length > 100) sbStardustTrail.splice(0, sbStardustTrail.length - 100);

    for (var i = sbEpicEvents.length - 1; i >= 0; i--) {
      var ev = sbEpicEvents[i];
      ev.life -= 16;
      if (ev.life <= 0) { sbEpicEvents.splice(i, 1); continue; }
      var ep = 1 - ev.life / ev.maxLife;
      if (ev.type === 'supernova') {
        sbCtx.globalAlpha = (1 - ep) * 0.9;
        sbCtx.fillStyle = '#fff';
        sbCtx.beginPath();
        sbCtx.arc(ev.x, ev.y, 5 + ep * 180, 0, Math.PI * 2);
        sbCtx.fill();
        var snGrad = sbCtx.createRadialGradient(ev.x, ev.y, 0, ev.x, ev.y, 250 * ep);
        snGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
        snGrad.addColorStop(0.3, 'rgba(200,170,120,0.4)');
        snGrad.addColorStop(0.7, 'rgba(180,140,180,0.15)');
        snGrad.addColorStop(1, 'transparent');
        sbCtx.globalAlpha = (1 - ep) * 0.5;
        sbCtx.fillStyle = snGrad;
        sbCtx.beginPath();
        sbCtx.arc(ev.x, ev.y, 250 * ep, 0, Math.PI * 2);
        sbCtx.fill();
        for (var p = 0; p < 40; p++) {
          var angle = (p / 40) * Math.PI * 2;
          var dist = ep * 220 * (0.5 + Math.random() * 0.5);
          var px = ev.x + Math.cos(angle) * dist;
          var py = ev.y + Math.sin(angle) * dist;
          sbCtx.globalAlpha = (1 - ep) * 0.6;
          sbCtx.fillStyle = (p % 3 === 0) ? '#fff' : '#c8aa78';
          sbCtx.beginPath();
          sbCtx.arc(px, py, 2 * (1 - ep), 0, Math.PI * 2);
          sbCtx.fill();
        }
      } else if (ev.type === 'gravityWave') {
        for (var w = 0; w < 5; w++) {
          var wp = (ep + w * 0.08) % 1;
          var wr = wp * 300;
          var wa = (1 - wp) * 0.25;
          sbCtx.globalAlpha = wa;
          sbCtx.strokeStyle = ev.color;
          sbCtx.lineWidth = 1.5 - w * 0.2;
          sbCtx.beginPath();
          sbCtx.arc(ev.x, ev.y, wr, 0, Math.PI * 2);
          sbCtx.stroke();
        }
      }
    }
    sbCtx.globalAlpha = 1;

    for (var i = 0; i < sandboxElements.length; i++) {
      var el = sandboxElements[i];
      var type = SB_ELEMENT_TYPES[el.type];
      var isSelected = (el.id === sandboxSelectedId);
      var br = el.brightness / 100;

      sbCtx.save();

      if (el.type === 'star') {
        var breathe = 1 + 0.15 * Math.sin(ts * 0.002 + el.pulsePhase);
        sbCtx.shadowColor = el.color;
        sbCtx.shadowBlur = type.glowSize * br;
        sbCtx.globalAlpha = br * 0.06;
        sbCtx.fillStyle = el.color;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * 8 * breathe, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.globalAlpha = br * 0.12;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * 5, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.globalAlpha = br * 0.25;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * 3, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.globalAlpha = 0.9;
        sbCtx.fillStyle = el.color;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.globalAlpha = br;
        sbCtx.fillStyle = '#fff';
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * 0.4, 0, Math.PI * 2); sbCtx.fill();
        if (br > 0.3 && el.size > 1.5) {
          var flareAngle = ts * 0.0005;
          for (var f = 0; f < 4; f++) {
            var fa = flareAngle + f * Math.PI / 2;
            var flen = el.size * (2 + Math.sin(ts * 0.003 + f) * 0.5);
            sbCtx.globalAlpha = br * 0.3;
            sbCtx.strokeStyle = el.color;
            sbCtx.lineWidth = 0.5;
            sbCtx.beginPath();
            sbCtx.moveTo(el.x - Math.cos(fa) * flen, el.y - Math.sin(fa) * flen);
            sbCtx.lineTo(el.x + Math.cos(fa) * flen, el.y + Math.sin(fa) * flen);
            sbCtx.stroke();
          }
        }
      } else if (el.type === 'planet') {
        sbCtx.shadowColor = el.color;
        sbCtx.shadowBlur = type.glowSize * br;
        sbCtx.globalAlpha = 0.7 + br * 0.3;
        sbCtx.fillStyle = el.color;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size, 0, Math.PI * 2); sbCtx.fill();
        var lightGrad = sbCtx.createRadialGradient(el.x - el.size * 0.3, el.y - el.size * 0.3, 0, el.x, el.y, el.size);
        lightGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
        lightGrad.addColorStop(0.5, 'rgba(255,255,255,0.03)');
        lightGrad.addColorStop(1, 'rgba(0,0,0,0.25)');
        sbCtx.globalAlpha = 1;
        sbCtx.fillStyle = lightGrad;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size, 0, Math.PI * 2); sbCtx.fill();
        if (el.size > 3) {
          var ringAngle = ts * 0.0001;
          sbCtx.globalAlpha = 0.25 + br * 0.1;
          sbCtx.strokeStyle = el.color;
          sbCtx.lineWidth = 1.2;
          sbCtx.beginPath();
          sbCtx.ellipse(el.x, el.y, el.size * 2, el.size * 0.6, 0.3 + ringAngle, 0, Math.PI * 2);
          sbCtx.stroke();
          sbCtx.globalAlpha = 0.1;
          sbCtx.beginPath();
          sbCtx.ellipse(el.x, el.y, el.size * 1.5, el.size * 0.45, 0.3 + ringAngle, 0, Math.PI * 2);
          sbCtx.stroke();
        }
      } else if (el.type === 'nebula') {
        el.nebulaPhase = (el.nebulaPhase || 0) + el.diffusionRate;
        var breath = 0.15 * Math.sin(el.nebulaPhase * 0.8);
        var diffScale = 1 + breath;
        var nebSize = el.size * diffScale;
        var nebColors = [el.color, shiftColor(el.color, 30), shiftColor(el.color, -30)];
        for (var layer = 0; layer < 3; layer++) {
          var layerSize = nebSize * (1 + layer * 0.4);
          for (var c = 0; c < 8; c++) {
            var angle = (c / 8) * Math.PI * 2 + ts * 0.0001 * (layer + 1);
            var dist = nebSize * 0.25 * (1 + 0.3 * Math.sin(ts * 0.0008 + c));
            var cx = el.x + Math.cos(angle) * dist;
            var cy = el.y + Math.sin(angle) * dist;
            sbCtx.globalAlpha = br * 0.035;
            sbCtx.fillStyle = nebColors[layer];
            sbCtx.shadowColor = nebColors[layer];
            sbCtx.shadowBlur = type.glowSize * br * 0.5;
            sbCtx.beginPath();
            sbCtx.arc(cx, cy, layerSize * (0.3 + Math.random() * 0.35), 0, Math.PI * 2);
            sbCtx.fill();
          }
        }
        sbCtx.shadowBlur = 0;
        sbCtx.globalAlpha = br * 0.12;
        sbCtx.shadowColor = el.color;
        sbCtx.shadowBlur = type.glowSize;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, nebSize * 0.3, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.shadowBlur = 0;
      } else if (el.type === 'meteor') {
        var headPulse = 1 + 0.3 * Math.sin(ts * 0.005);
        sbCtx.shadowColor = el.color;
        sbCtx.shadowBlur = type.glowSize * br * headPulse;
        sbCtx.globalAlpha = 0.9;
        sbCtx.fillStyle = el.color;
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * headPulse, 0, Math.PI * 2); sbCtx.fill();
        sbCtx.globalAlpha = br;
        sbCtx.fillStyle = '#fff';
        sbCtx.beginPath(); sbCtx.arc(el.x, el.y, el.size * 0.4, 0, Math.PI * 2); sbCtx.fill();
        var trailLen = el.size * 12;
        for (var t = 0; t < 6; t++) {
          var tAlpha = br * (1 - t / 6) * 0.5;
          var tSize = el.size * (1 - t * 0.12);
          var tx = el.x - (trailLen / 6) * t;
          var ty = el.y + (trailLen * 0.3 / 6) * t;
          sbCtx.globalAlpha = tAlpha;
          sbCtx.fillStyle = el.color;
          sbCtx.beginPath();
          sbCtx.arc(tx + (Math.random() - 0.5) * t, ty + (Math.random() - 0.5) * t, tSize, 0, Math.PI * 2);
          sbCtx.fill();
        }
        var tailGrad = sbCtx.createLinearGradient(el.x, el.y, el.x - trailLen, el.y + trailLen * 0.3);
        tailGrad.addColorStop(0, el.color);
        tailGrad.addColorStop(0.3, 'rgba(200, 200, 255, 0.3)');
        tailGrad.addColorStop(1, 'transparent');
        sbCtx.globalAlpha = br * 0.5;
        sbCtx.strokeStyle = tailGrad;
        sbCtx.lineWidth = el.size * 0.4;
        sbCtx.lineCap = 'round';
        sbCtx.beginPath();
        sbCtx.moveTo(el.x, el.y);
        sbCtx.lineTo(el.x - trailLen, el.y + trailLen * 0.3);
        sbCtx.stroke();
        sbCtx.shadowBlur = 0;
      }

      sbCtx.restore();

      if (isSelected) {
        sbCtx.beginPath();
        sbCtx.arc(el.x, el.y, el.size + 8, 0, Math.PI * 2);
        sbCtx.strokeStyle = 'rgba(200, 170, 120, 0.55)';
        sbCtx.lineWidth = 1;
        sbCtx.setLineDash([3, 3]);
        sbCtx.lineDashOffset = -(ts * 0.03) % 6;
        sbCtx.stroke();
        sbCtx.setLineDash([]);
      }

      var hasConn = false;
      for (var c = 0; c < sandboxConnections.length; c++) {
        if (sandboxConnections[c].fromId === el.id || sandboxConnections[c].toId === el.id) { hasConn = true; break; }
      }
      if (hasConn) {
        var cpulse = 0.5 + 0.5 * Math.sin(ts * 0.002 * el.pulseSpeed + el.pulsePhase);
        sbCtx.globalAlpha = cpulse * 0.08;
        sbCtx.fillStyle = el.color;
        sbCtx.beginPath();
        sbCtx.arc(el.x, el.y, el.size * 6, 0, Math.PI * 2);
        sbCtx.fill();
        sbCtx.globalAlpha = 1;
      }

      if (el.name) {
        sbCtx.globalAlpha = 0.4;
        sbCtx.fillStyle = '#a09890';
        sbCtx.font = '12px "PingFang SC", "Noto Serif SC", "STSong", "Songti SC", serif';
        sbCtx.textAlign = 'center';
        sbCtx.fillText(el.name, el.x, el.y + el.size + 14);
        sbCtx.globalAlpha = 1;
      }
    }
  }

  function sbOnMouseDown(e) {
    var rect = sbCv.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;

    if (sandboxTool === 'connect') {
      var target = sbFindElementAt(x, y);
      if (target) {
        if (sandboxConnectFrom === null) {
          sandboxConnectFrom = target.id;
          sandboxSelectedId = target.id;
        } else if (target.id !== sandboxConnectFrom) {
          var exists = false;
          for (var i = 0; i < sandboxConnections.length; i++) {
            var c = sandboxConnections[i];
            if ((c.fromId === sandboxConnectFrom && c.toId === target.id) || (c.fromId === target.id && c.toId === sandboxConnectFrom)) { exists = true; break; }
          }
          if (!exists) {
            sandboxConnections.push({ fromId: sandboxConnectFrom, toId: target.id });
            sbPlayConnectSound();
            sbCreateBurstEffect((sbFindElement(sandboxConnectFrom).x + target.x) / 2, (sbFindElement(sandboxConnectFrom).y + target.y) / 2, '#c8aa78');
          }
          sandboxConnectFrom = null;
          sandboxSelectedId = null;
        }
      } else {
        sandboxConnectFrom = null;
        sandboxSelectedId = null;
      }
      return;
    }

    if (sandboxTool === 'erase') {
      var target = sbFindElementAt(x, y);
      if (target) {
        sbPlayDeleteSound();
        sbCreateBurstEffect(target.x, target.y, '#ff6666');
        var idx = sandboxElements.indexOf(target);
        if (idx >= 0) sandboxElements.splice(idx, 1);
        sandboxConnections = sandboxConnections.filter(function(c) { return c.fromId !== target.id && c.toId !== target.id; });
        if (sandboxSelectedId === target.id) sandboxSelectedId = null;
        if (sandboxConnectFrom === target.id) sandboxConnectFrom = null;
      }
      return;
    }

    var existing = sbFindElementAt(x, y);
    if (existing) {
      sandboxDragging = true;
      sandboxDragElement = existing;
      sandboxDragOffX = x - existing.x;
      sandboxDragOffY = y - existing.y;
      sandboxSelectedId = existing.id;
    } else {
      var newEl = sbCreateElement(x, y);
      if (newEl) sandboxSelectedId = newEl.id;
    }
  }

  function sbOnMouseMove(e) {
    var rect = sbCv.getBoundingClientRect();
    sandboxMouseX = e.clientX - rect.left;
    sandboxMouseY = e.clientY - rect.top;
    if (sandboxDragging && sandboxDragElement) {
      sandboxDragElement.x = sandboxMouseX - sandboxDragOffX;
      sandboxDragElement.y = sandboxMouseY - sandboxDragOffY;
    }
    if (!sandboxDragging) {
      sbStardustTrail.push({
        x: sandboxMouseX, y: sandboxMouseY,
        life: 600, maxLife: 600,
        size: 1 + Math.random() * 1.5,
        color: 'rgba(200, 170, 120, 0.5)'
      });
    }
  }

  function sbOnMouseUp() {
    sandboxDragging = false;
    sandboxDragElement = null;
  }

  function sbBindEvents() {
    sbCv.addEventListener('mousedown', sbOnMouseDown);
    window.addEventListener('mousemove', sbOnMouseMove);
    window.addEventListener('mouseup', sbOnMouseUp);
    sbCv.addEventListener('touchstart', function(e) {
      e.preventDefault();
      var t = e.touches[0];
      sbOnMouseDown({ clientX: t.clientX, clientY: t.clientY });
    }, { passive: false });
    window.addEventListener('touchmove', function(e) {
      if (!e.touches.length) return;
      var t = e.touches[0];
      sandboxMouseX = t.clientX - sbCv.getBoundingClientRect().left;
      sandboxMouseY = t.clientY - sbCv.getBoundingClientRect().top;
      if (sandboxDragging && sandboxDragElement) {
        sandboxDragElement.x = sandboxMouseX - sandboxDragOffX;
        sandboxDragElement.y = sandboxMouseY - sandboxDragOffY;
      }
    }, { passive: true });
    window.addEventListener('touchend', function() {
      sbOnMouseUp();
    });
  }

  function sbSetTool(tool) {
    sandboxTool = tool;
    sandboxConnectFrom = null;
    document.querySelectorAll('#sandboxTools .tool-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.tool === tool);
    });
    var panel = document.getElementById('sbPropertyPanel');
    panel.classList.toggle('hidden', tool === 'connect' || tool === 'erase');
    if (tool === 'connect') sbCv.style.cursor = 'cell';
    else if (tool === 'erase') sbCv.style.cursor = 'not-allowed';
    else sbCv.style.cursor = 'crosshair';
    var hints = {
      star: '点击放置恒星', planet: '点击放置行星（靠近恒星会环绕）',
      nebula: '点击放置星云（会缓慢扩散）', meteor: '点击放置流星',
      connect: '点击第一个天体，再点击第二个以连线',
      erase: '点击天体以删除'
    };
    document.getElementById('sbHint').textContent = hints[tool] || '';
  }

  function sbHandleKeydown(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === '1') { sbSetTool('star'); e.preventDefault(); }
    else if (e.key === '2') { sbSetTool('planet'); e.preventDefault(); }
    else if (e.key === '3') { sbSetTool('nebula'); e.preventDefault(); }
    else if (e.key === '4') { sbSetTool('meteor'); e.preventDefault(); }
    else if (e.key === '5') { sbSetTool('connect'); e.preventDefault(); }
    else if (e.key === '6') { sbSetTool('erase'); e.preventDefault(); }
    else if (e.key === 'Escape') {
      sandboxSelectedId = null; sandboxConnectFrom = null; e.preventDefault();
    }
    else if ((e.key === 'Delete' || e.key === 'Backspace') && sandboxSelectedId !== null) {
      var target = sbFindElement(sandboxSelectedId);
      if (target) {
        var idx = sandboxElements.indexOf(target);
        if (idx >= 0) sandboxElements.splice(idx, 1);
        sandboxConnections = sandboxConnections.filter(function(c) { return c.fromId !== target.id && c.toId !== target.id; });
        sandboxSelectedId = null;
        if (sandboxConnectFrom === target.id) sandboxConnectFrom = null;
      }
      e.preventDefault();
    }
    else if ((e.key === 'n' || e.key === 'N') && !e.ctrlKey && !e.metaKey) {
      e.preventDefault(); sbTriggerSupernova();
    }
  }

  function sbTriggerSupernova() {
    var cx = sbW / 2 + (Math.random() - 0.5) * sbW * 0.4;
    var cy = sbH / 2 + (Math.random() - 0.5) * sbH * 0.4;
    sbEpicEvents.push({ type: 'supernova', x: cx, y: cy, life: 2500, maxLife: 2500, radius: 250, color: '#c8aa78' });
    sbPlaySupernovaSound();
    var blastRadius = 150;
    for (var i = sandboxElements.length - 1; i >= 0; i--) {
      var el = sandboxElements[i];
      var dx = el.x - cx, dy = el.y - cy;
      if (Math.sqrt(dx*dx + dy*dy) < blastRadius && Math.random() < 0.5) {
        sbCreateBurstEffect(el.x, el.y, '#ff8844');
        sandboxConnections = sandboxConnections.filter(function(c) { return c.fromId !== el.id && c.toId !== el.id; });
        sandboxElements.splice(i, 1);
        if (sandboxSelectedId === el.id) sandboxSelectedId = null;
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawDivider(ctx, x, y, w) {
    var g = ctx.createLinearGradient(x, 0, x + w, 0);
    g.addColorStop(0, 'transparent');
    g.addColorStop(0.5, 'rgba(200,170,120,0.15)');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(x, y + 8, w, 1);
  }

  function wrapText(text, maxWidth, ctx) {
    if (!ctx) {
      ctx = document.createElement('canvas').getContext('2d');
    }
    ctx.font = '13px "PingFang SC", "Noto Serif SC", sans-serif';
    var chars = text.split('');
    var lines = [];
    var current = '';
    for (var i = 0; i < chars.length; i++) {
      var test = current + chars[i];
      if (ctx.measureText(test).width > maxWidth && current) {
        lines.push(current);
        current = chars[i];
      } else {
        current = test;
      }
    }
    if (current) lines.push(current);
    return lines;
  }

  function sbRenderToCanvas(canvas, w, h) {
    var rctx = canvas.getContext('2d');
    rctx.clearRect(0, 0, w, h);
    var grad = rctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.8);
    grad.addColorStop(0, 'rgba(10, 12, 18, 1)');
    grad.addColorStop(0.5, 'rgba(8, 8, 14, 1)');
    grad.addColorStop(1, 'rgba(6, 6, 11, 1)');
    rctx.fillStyle = grad;
    rctx.fillRect(0, 0, w, h);
    var sx = w / sbW, sy = h / sbH;

    for (var i = 0; i < 120; i++) {
      var bx = Math.random() * w, by = Math.random() * h;
      var br2 = 0.3 + Math.random() * 0.8;
      var twinkle = 0.2 + Math.random() * 0.5;
      rctx.globalAlpha = twinkle;
      rctx.fillStyle = Math.random() > 0.7 ? '#a0c0e0' : '#fff';
      rctx.beginPath(); rctx.arc(bx, by, br2, 0, Math.PI * 2); rctx.fill();
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sandboxElements.length; i++) {
      for (var j = i + 1; j < sandboxElements.length; j++) {
        var a = sandboxElements[i], b = sandboxElements[j];
        var dx2 = a.x - b.x, dy2 = a.y - b.y;
        var dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        if (dist < 130 && dist > 15) {
          var alpha2 = (1 - dist / 130) * 0.2;
          rctx.globalAlpha = alpha2;
          rctx.beginPath(); rctx.moveTo(a.x * sx, a.y * sy); rctx.lineTo(b.x * sx, b.y * sy);
          rctx.strokeStyle = '#c8aa78'; rctx.lineWidth = 0.6; rctx.stroke();
        }
      }
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sandboxConnections.length; i++) {
      var conn = sandboxConnections[i];
      var f = sbFindElement(conn.fromId), t2 = sbFindElement(conn.toId);
      if (!f || !t2) continue;
      rctx.globalAlpha = 0.15;
      rctx.beginPath(); rctx.moveTo(f.x * sx, f.y * sy); rctx.lineTo(t2.x * sx, t2.y * sy);
      rctx.strokeStyle = '#c8aa78'; rctx.lineWidth = 1; rctx.stroke();
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sandboxElements.length; i++) {
      var el = sandboxElements[i];
      if (el._orbitStarRef) {
        var star = el._orbitStarRef;
        var orbitR = el._orbitRadius || 80;
        var ecc = el._orbitEccentricity || 0.6;
        rctx.globalAlpha = 0.08;
        rctx.strokeStyle = el.color; rctx.lineWidth = 0.6;
        rctx.setLineDash([3, 5]);
        rctx.beginPath();
        rctx.ellipse(star.x * sx, star.y * sy, orbitR * sx, orbitR * sy * ecc, 0, 0, Math.PI * 2);
        rctx.stroke();
        rctx.setLineDash([]);
      }
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sandboxElements.length; i++) {
      var el = sandboxElements[i];
      if (el._trail && el._trail.length > 2) {
        for (var tt = 0; tt < el._trail.length; tt++) {
          var tp = el._trail[tt];
          rctx.globalAlpha = tp.alpha * 0.4;
          rctx.fillStyle = el.color;
          rctx.beginPath();
          rctx.arc(tp.x * sx, tp.y * sy, Math.max(el.size * sx * 0.5 * tp.alpha, 0.5), 0, Math.PI * 2);
          rctx.fill();
        }
      }
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sandboxElements.length; i++) {
      var el = sandboxElements[i];
      var ex = el.x * sx, ey = el.y * sy, es = Math.max(el.size * sx, 1.5);
      var br2 = el.brightness / 100;

      if (el.type === 'star') {
        rctx.globalAlpha = br2 * 0.06;
        rctx.fillStyle = el.color;
        rctx.beginPath(); rctx.arc(ex, ey, es * 8, 0, Math.PI * 2); rctx.fill();
        rctx.globalAlpha = br2 * 0.12;
        rctx.beginPath(); rctx.arc(ex, ey, es * 5, 0, Math.PI * 2); rctx.fill();
        rctx.globalAlpha = br2 * 0.25;
        rctx.beginPath(); rctx.arc(ex, ey, es * 3, 0, Math.PI * 2); rctx.fill();
        rctx.globalAlpha = 0.9;
        rctx.shadowColor = el.color; rctx.shadowBlur = 20 * br2;
        rctx.fillStyle = el.color;
        rctx.beginPath(); rctx.arc(ex, ey, es, 0, Math.PI * 2); rctx.fill();
        rctx.shadowBlur = 0;
        rctx.globalAlpha = br2;
        rctx.fillStyle = '#fff';
        rctx.beginPath(); rctx.arc(ex, ey, es * 0.4, 0, Math.PI * 2); rctx.fill();
        if (br2 > 0.3 && es > 2) {
          for (var f = 0; f < 4; f++) {
            var fa = f * Math.PI / 2 + 0.3;
            var flen = es * 2;
            rctx.globalAlpha = br2 * 0.25;
            rctx.strokeStyle = el.color; rctx.lineWidth = 0.5;
            rctx.beginPath();
            rctx.moveTo(ex - Math.cos(fa) * flen, ey - Math.sin(fa) * flen);
            rctx.lineTo(ex + Math.cos(fa) * flen, ey + Math.sin(fa) * flen);
            rctx.stroke();
          }
        }
      } else if (el.type === 'planet') {
        rctx.shadowColor = el.color; rctx.shadowBlur = 8;
        rctx.globalAlpha = 0.8;
        rctx.fillStyle = el.color;
        rctx.beginPath(); rctx.arc(ex, ey, es, 0, Math.PI * 2); rctx.fill();
        var lg = rctx.createRadialGradient(ex - es * 0.3, ey - es * 0.3, 0, ex, ey, es);
        lg.addColorStop(0, 'rgba(255,255,255,0.2)');
        lg.addColorStop(1, 'rgba(0,0,0,0.2)');
        rctx.globalAlpha = 1;
        rctx.fillStyle = lg;
        rctx.beginPath(); rctx.arc(ex, ey, es, 0, Math.PI * 2); rctx.fill();
        rctx.shadowBlur = 0;
        if (es > 3) {
          rctx.globalAlpha = 0.2;
          rctx.strokeStyle = el.color; rctx.lineWidth = 1;
          rctx.beginPath();
          rctx.ellipse(ex, ey, es * 2, es * 0.6, 0.3, 0, Math.PI * 2);
          rctx.stroke();
        }
      } else if (el.type === 'nebula') {
        var nebColors = [el.color, shiftColor(el.color, 30), shiftColor(el.color, -30)];
        for (var layer = 0; layer < 3; layer++) {
          var layerSize = es * (1 + layer * 0.4);
          for (var c = 0; c < 6; c++) {
            var angle2 = (c / 6) * Math.PI * 2 + layer * 0.5;
            var dist2 = es * 0.25;
            var cx = ex + Math.cos(angle2) * dist2;
            var cy = ey + Math.sin(angle2) * dist2;
            rctx.globalAlpha = br2 * 0.03;
            rctx.fillStyle = nebColors[layer];
            rctx.shadowColor = nebColors[layer]; rctx.shadowBlur = 20;
            rctx.beginPath();
            rctx.arc(cx, cy, layerSize * 0.35, 0, Math.PI * 2);
            rctx.fill();
          }
        }
        rctx.shadowBlur = 0;
        rctx.globalAlpha = br2 * 0.1;
        rctx.shadowColor = el.color; rctx.shadowBlur = 25;
        rctx.beginPath(); rctx.arc(ex, ey, es * 0.3, 0, Math.PI * 2); rctx.fill();
        rctx.shadowBlur = 0;
      } else if (el.type === 'meteor') {
        rctx.shadowColor = el.color; rctx.shadowBlur = 8;
        rctx.globalAlpha = 0.9;
        rctx.fillStyle = el.color;
        rctx.beginPath(); rctx.arc(ex, ey, es, 0, Math.PI * 2); rctx.fill();
        rctx.shadowBlur = 0;
        rctx.globalAlpha = br2;
        rctx.fillStyle = '#fff';
        rctx.beginPath(); rctx.arc(ex, ey, es * 0.4, 0, Math.PI * 2); rctx.fill();
        var trailLen = es * 10;
        for (var t = 0; t < 5; t++) {
          var tAlpha = br2 * (1 - t / 5) * 0.4;
          var tSize = es * (1 - t * 0.15);
          var tx2 = ex - (trailLen / 5) * t;
          var ty2 = ey + (trailLen * 0.3 / 5) * t;
          rctx.globalAlpha = tAlpha;
          rctx.fillStyle = el.color;
          rctx.beginPath(); rctx.arc(tx2, ty2, tSize, 0, Math.PI * 2); rctx.fill();
        }
        var tg = rctx.createLinearGradient(ex, ey, ex - trailLen, ey + trailLen * 0.3);
        tg.addColorStop(0, el.color);
        tg.addColorStop(0.4, 'rgba(200, 200, 255, 0.25)');
        tg.addColorStop(1, 'transparent');
        rctx.globalAlpha = br2 * 0.4;
        rctx.strokeStyle = tg; rctx.lineWidth = es * 0.4; rctx.lineCap = 'round';
        rctx.beginPath(); rctx.moveTo(ex, ey); rctx.lineTo(ex - trailLen, ey + trailLen * 0.3); rctx.stroke();
      }
      rctx.globalAlpha = 1;

      if (el.name) {
        rctx.globalAlpha = 0.35;
        rctx.fillStyle = '#a09890';
        rctx.font = Math.max(10, 12 * sx) + 'px "PingFang SC", "Noto Serif SC", sans-serif';
        rctx.textAlign = 'center';
        rctx.fillText(el.name, ex, ey + es + 14 * sy);
        rctx.globalAlpha = 1;
      }
    }
    rctx.globalAlpha = 1;

    for (var i = 0; i < sbEpicEvents.length; i++) {
      var ev = sbEpicEvents[i];
      if (ev.type === 'supernova') {
        var evProgress = 1 - ev.life / ev.maxLife;
        rctx.globalAlpha = (1 - evProgress) * 0.5;
        var snG = rctx.createRadialGradient(ev.x * sx, ev.y * sy, 0, ev.x * sx, ev.y * sy, 150 * evProgress * sx);
        snG.addColorStop(0, 'rgba(255,255,255,0.4)');
        snG.addColorStop(0.5, 'rgba(200,170,120,0.2)');
        snG.addColorStop(1, 'transparent');
        rctx.fillStyle = snG;
        rctx.beginPath(); rctx.arc(ev.x * sx, ev.y * sy, 150 * evProgress * sx, 0, Math.PI * 2); rctx.fill();
      }
    }
    rctx.globalAlpha = 1;

    rctx.globalAlpha = 0.25;
    rctx.fillStyle = '#c8aa78';
    rctx.font = '13px "PingFang SC", "Noto Serif SC", sans-serif';
    rctx.textAlign = 'center';
    rctx.fillText('星空沙盘', w / 2, h - 12);
    rctx.globalAlpha = 1;
  }

  function sbGeneratePoem(stars, planets, nebulas, meteors, connections) {
    var parts = [];
    if (stars > 0) {
      var sl = [
        stars + ' 颗星辰点亮了这片夜空',
        '星子散落，如同你心底未曾说出的话',
        stars + ' 点星光，在黑暗中彼此守望',
        '你种下了 ' + stars + ' 颗星辰，它们在寂静中呼吸'
      ];
      parts.push(sl[Math.floor(Math.random() * sl.length)]);
    }
    if (planets > 0) {
      var pl = [
        planets + ' 颗行星缓缓运转，各有其轨道',
        '行星孤独而坚定，在各自的轨迹上沉默前行',
        planets + ' 个世界，在星空间安静旋转'
      ];
      parts.push(pl[Math.floor(Math.random() * pl.length)]);
    }
    if (nebulas > 0) {
      var nl = [
        nebulas + ' 片星云弥漫，是恒星诞生的摇篮',
        '星云如雾如幻，藏着宇宙最深的温柔',
        '朦胧的星云里，孕育着尚未命名的光'
      ];
      parts.push(nl[Math.floor(Math.random() * nl.length)]);
    }
    if (meteors > 0) {
      var ml = [
        meteors + ' 道流星划过，每一道都是一个来不及许的愿望',
        '流星是夜的笔触，短暂却绚烂',
        '转瞬即逝的光芒，是宇宙在向你眨眼'
      ];
      parts.push(ml[Math.floor(Math.random() * ml.length)]);
    }
    if (connections > 0) {
      var cl = [
        connections + ' 条星线相连，织成你心中的星座',
        '星辰之间的连线，是沉默者之间的对话',
        '你把这些光连在一起，便有了属于你自己的星图'
      ];
      parts.push(cl[Math.floor(Math.random() * cl.length)]);
    }
    if (parts.length === 0) return '这片星空还很安静，等待你的第一颗星。';
    var closings = [
      '这是你的星空，此刻只属于你。',
      '在这片你亲手布置的夜空里，一切都很安全。',
      '不需要解释这片星空的意义，它存在，便已足够。'
    ];
    parts.push(closings[Math.floor(Math.random() * closings.length)]);
    return parts.join('。');
  }

  function sbGeneratePsychAnalysis(stars, planets, nebulas, meteors, connections, totalEl) {
    var sections = [];
    var total = totalEl;
    if (total === 0) {
      sections.push({ title: '心理分析', text: '你的星空还很安静——也许你正在观察和准备，还没有迈出第一步。这种谨慎本身也是一种有意义的姿态。' });
      return sections;
    }

    var parts = [];

    if (stars > 0) {
      if (stars === 1) {
        parts.push('你只放置了一颗恒星，这可能意味着你的内心有一个非常明确的核心驱动力或信念。单星模式常见于那些正在寻找"锚点"的人——你需要一个稳定的参照来组织其余的生活经验。');
      } else if (stars <= 3) {
        parts.push('少数几颗恒星表明你的内在能量是集中的，你有几个重要的价值支点。这种配置暗示着你倾向于在少数关键关系或目标上投入较深的情感。');
      } else {
        parts.push('多颗恒星散布在夜空中，显示出你是一个内在能量充沛、多面向的人。你同时被多个目标或关系吸引着，这既是创造力的来源，也可能带来注意力的分散。');
      }
    }

    if (planets > 0) {
      if (planets <= 2) {
        parts.push('你放置了少量行星，暗示你在关系中倾向于深度而非广度。你更愿意围绕重要的核心建立稳定而亲密的联结。');
      } else {
        parts.push('多颗行星反映出你拥有丰富的关系网络和多层次的兴趣。你善于在不同的角色和情境之间切换，但需要注意是否有时会感到被拉扯。');
      }
    }

    if (nebulas > 0) {
      if (nebulas > 2) {
        parts.push('多片星云表明你的内心世界非常丰饶，有大量未经表达的情感和想象力。你可能正处于一个内在转化的阶段，许多东西正在酝酿但尚未完全显化。');
      } else {
        parts.push('星云象征着潜意识中正在孕育的东西——可能是尚未成型的情感、创意或人生方向。这片星云是你内心深处某种柔软情绪的投射，也许是一种温柔的忧郁或期待。');
      }
    }

    if (meteors > 0) {
      parts.push('流星代表着那些短暂却强烈的体验——灵感、冲动、转瞬即逝的情感。');
      if (meteors > 2) {
        parts.push('多道流星暗示你内心有许多未完成的念头和来不及消化的体验。你可能是一个容易被瞬间美感打动的人，但也需要注意持久力的培养。');
      }
    }

    if (connections > 0) {
      if (connections <= 2) {
        parts.push('你选择了少量而精确的连线，说明你在关系中重视质量而非数量。这些连线可能代表了你心中特别珍视的纽带。');
      } else {
        parts.push('密集的连线网络显示出你是一个高度关联型的人，你善于看到事物之间的联系。这可能意味着你有很强的系统思维能力，但有时也会被关系的复杂度所消耗。');
      }
    }

    if (stars > planets && stars > nebulas) {
      parts.push('总体而言，你的星空以恒星为主导，说明你是一个内在驱动力很强的人。你倾向于先确立自己的核心，再让其他事物围绕它展开。');
    } else if (planets > stars) {
      parts.push('你的星空中行星更为突出，暗示你更关注"围绕什么在运转"——你可能是一个适应性很强、善于在关系中寻找定位的人。');
    } else if (nebulas >= stars) {
      parts.push('星云在你的星空中占据重要位置，这表明你是一个感性而富有想象力的人，内心有许多尚未完全成形但非常有潜力的东西。');
    } else {
      parts.push('你的星空呈现出一种多元的平衡——各种元素都有体现，说明你的内在世界是丰富而有层次的。');
    }

    sections.push({ title: '心理分析', text: parts.join('') });

    if (sandboxElements.length >= 2) {
      var avgX = 0, avgY = 0, spreadX = 0, spreadY = 0;
      for (var i = 0; i < sandboxElements.length; i++) {
        avgX += sandboxElements[i].x; avgY += sandboxElements[i].y;
      }
      avgX /= sandboxElements.length; avgY /= sandboxElements.length;
      for (var i = 0; i < sandboxElements.length; i++) {
        spreadX += Math.pow(sandboxElements[i].x - avgX, 2);
        spreadY += Math.pow(sandboxElements[i].y - avgY, 2);
      }
      spreadX = Math.sqrt(spreadX / sandboxElements.length);
      spreadY = Math.sqrt(spreadY / sandboxElements.length);
      var spread = (spreadX + spreadY) / 2;
      var spatial = [];
      if (spread < 120) {
        spatial.push('你的天体分布非常集中，这可能反映出你倾向于聚焦于某个特定的心理空间或情感领域。');
      } else if (spread < 300) {
        spatial.push('天体的分布比较均衡，说明你的心理空间既不过于拥挤也不过于空旷，处于一种舒适的状态。');
      } else {
        spatial.push('天体散布在较大的空间中，暗示你的注意力和情感能量分布在较广的领域，你可能是一个思维开阔但有时精力分散的人。');
      }
      sections.push({ title: '空间分布', text: spatial.join('') });
    }

    var closings = [
      '以上分析基于投射心理学中的沙盘理论，你的星空布局反映了当前的内在状态。这不是诊断，而是一面镜子——帮助你看到自己内心世界的某种形状。',
      '星空沙盘是一种投射性心理表达工具。你的每一个选择——放置什么、放在哪里、如何连接——都是内心世界的某种隐喻。这份分析旨在帮你看到这些模式。',
      '投射心理学认为，当我们在自由的空间中创造时，无意识的内容会自然浮现。你的星空就是你内心地图的一种可视化——没有对错，只有真实。'
    ];
    sections.push({ title: '关于此分析', text: closings[Math.floor(Math.random() * closings.length)] });

    return sections;
  }

  function sbOpenViewMode() {
    sbViewMode = true;
    document.getElementById('sbResultView').classList.add('active');

      var t = sandboxElements[i].type;
      if (t === 'star') sc++; else if (t === 'planet') pc++;
      else if (t === 'nebula') nc++; else if (t === 'meteor') mc++;
    }
    document.getElementById('sbResultStats').textContent = sc + ' 颗恒星 · ' + pc + ' 颗行星 · ' + nc + ' 片星云 · ' + mc + ' 道流星 · ' + cc + ' 条连线';

  function sbExportSandbox() {
    var cardW = 420;
    var padX = 30;
    var contentW = cardW - padX * 2;
    var canvasH = 360;

    var mCtx = document.createElement('canvas').getContext('2d');

    var sections = sandboxElements.length > 0 ? sbGeneratePsychAnalysis(
      sandboxElements.filter(function(e){return e.type==='star';}).length,
      sandboxElements.filter(function(e){return e.type==='planet';}).length,
      sandboxElements.filter(function(e){return e.type==='nebula';}).length,
      sandboxElements.filter(function(e){return e.type==='meteor';}).length,
      sandboxConnections.length,
      sandboxElements.length
    ) : [];

    var healText = sbRandomHealing();
    var sc = sandboxElements.filter(function(e){return e.type==='star';}).length;
    var pc = sandboxElements.filter(function(e){return e.type==='planet';}).length;
    var nc = sandboxElements.filter(function(e){return e.type==='nebula';}).length;
    var mc = sandboxElements.filter(function(e){return e.type==='meteor';}).length;
    var cc = sandboxConnections.length;

    var descLines = wrapText(sbExportDescription, contentW - 10, mCtx);

    var sectionData = [];
    var psychTotalH = 0;
    for (var i = 0; i < sections.length; i++) {
      var sec = sections[i];
      var tLines = wrapText(sec.title, contentW - 24, mCtx);
      var sLines = wrapText(sec.text, contentW - 24, mCtx);
      var secH = tLines.length * 20 + sLines.length * 18 + 8;
      psychTotalH += secH;
      sectionData.push({ sec: sec, tLines: tLines, sLines: sLines, secH: secH });
    }

    var hLines = wrapText(healText, contentW - 30, mCtx);
    var healingBoxH = hLines.length * 20 + 40;

    var totalH = canvasH + 40 + 28 + 22 + 18 + 16 + descLines.length * 20 + 16 + psychTotalH + 16 + healingBoxH + 20;

    var expCv = document.createElement('canvas');
    var scale = 2;
    expCv.width = cardW * scale;
    expCv.height = totalH * scale;
    var ctx = expCv.getContext('2d');
    ctx.scale(scale, scale);

    var cGrad = ctx.createLinearGradient(0, 0, 0, totalH);
    cGrad.addColorStop(0, '#12101a');
    cGrad.addColorStop(1, '#0a0a10');
    ctx.fillStyle = cGrad;
    roundRect(ctx, 0, 0, cardW, totalH, 16);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,170,120,0.15)';
    ctx.lineWidth = 1;
    roundRect(ctx, 0, 0, cardW, totalH, 16);
    ctx.stroke();

    var y = 0;

    var starCv = document.getElementById('sbResultCanvas');
    ctx.save();
    roundRect(ctx, padX, y, contentW, canvasH, 10);
    ctx.clip();
    ctx.drawImage(starCv, padX, y, contentW, canvasH);
    ctx.restore();
    ctx.strokeStyle = 'rgba(200,170,120,0.1)';
    ctx.lineWidth = 1;
    roundRect(ctx, padX, y, contentW, canvasH, 10);
    ctx.stroke();
    y += canvasH + 40;

    ctx.fillStyle = '#c8aa78';
    ctx.font = '22px "PingFang SC", "Noto Serif SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('你的星空沙盘', cardW / 2, y + 22);
    y += 28;

    ctx.fillStyle = '#706860';
    ctx.font = '13px "PingFang SC", "Noto Serif SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(sc + ' 颗恒星 · ' + pc + ' 颗行星 · ' + nc + ' 片星云 · ' + mc + ' 道流星 · ' + cc + ' 条连线', cardW / 2, y + 16);
    y += 22;

    drawDivider(ctx, padX, y, contentW);
    y += 16;

    ctx.fillStyle = '#a09890';
    ctx.font = '14px "PingFang SC", "Noto Serif SC", sans-serif';
    ctx.textAlign = 'center';
    for (var i = 0; i < descLines.length; i++) {
      ctx.fillText(descLines[i], cardW / 2, y + 18 + i * 20);
    }
    y += descLines.length * 20 + 16;

    drawDivider(ctx, padX, y, contentW);
    y += 16;

    ctx.textAlign = 'left';
    for (var i = 0; i < sectionData.length; i++) {
      var sd = sectionData[i];
      ctx.fillStyle = 'rgba(200,170,120,0.35)';
      ctx.fillRect(padX, y + 2, 2, 16);
      ctx.fillStyle = '#c8aa78';
      ctx.font = '15px "PingFang SC", "Noto Serif SC", sans-serif';
      for (var t = 0; t < sd.tLines.length; t++) {
        ctx.fillText(sd.tLines[t], padX + 12, y + 15 + t * 20);
      }
      var titleH = sd.tLines.length * 20;
      ctx.fillStyle = '#a09890';
      ctx.font = '13px "PingFang SC", "Noto Serif SC", sans-serif';
      for (var j = 0; j < sd.sLines.length; j++) {
        ctx.fillText(sd.sLines[j], padX + 12, y + titleH + 16 + j * 18);
      }
      y += sd.secH;
    }

    drawDivider(ctx, padX, y, contentW);
    y += 16;

    ctx.fillStyle = 'rgba(200,170,120,0.04)';
    roundRect(ctx, padX, y, contentW, healingBoxH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,170,120,0.08)';
    ctx.lineWidth = 1;
    roundRect(ctx, padX, y, contentW, healingBoxH, 10);
    ctx.stroke();

    ctx.fillStyle = '#706860';
    ctx.font = '11px "PingFang SC", "Noto Serif SC", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('今日心灵寄语', cardW / 2, y + 18);
    ctx.fillStyle = '#c8aa78';
    ctx.font = 'italic 14px "PingFang SC", "Noto Serif SC", sans-serif';
    for (var i = 0; i < hLines.length; i++) {
      ctx.fillText(hLines[i], cardW / 2, y + 36 + i * 20);
    }

    var link = document.createElement('a');
    link.download = '星空沙盘卡片-' + Date.now() + '.png';
    link.href = expCv.toDataURL('image/png');
    link.click();

    var toast = document.getElementById('sbSaveToast');
    toast.textContent = '星空卡片已导出';
    toast.classList.add('visible');
    setTimeout(function() { toast.classList.remove('visible'); }, 2000);
  }

  function sbClearSandbox() {
    sandboxElements = []; sandboxConnections = [];
    sbClickEffects = []; sbStardustTrail = []; sbEpicEvents = [];
    sandboxSelectedId = null; sandboxConnectFrom = null;
  }

  function sbAnimate(ts) {
    sbRender(ts);
    requestAnimationFrame(sbAnimate);
  }

  /* ===== PUBLIC OPEN/CLOSE ===== */
  window.sbOpenSandbox = function() {
    var overlay = document.getElementById('starSandbox');
    overlay.classList.add('active');
    document.getElementById('sbReturnBtn').style.display = 'block';
    sbInitCanvas();
    sbBindEvents();
    sandboxElements = []; sandboxConnections = [];
    sbClickEffects = []; sbStardustTrail = []; sbEpicEvents = [];
    sandboxTool = 'star'; sandboxSelectedId = null;
    sandboxConnectFrom = null; sandboxDragging = false;
    sbViewMode = false;
    sbSetTool('star');
    document.getElementById('sbResultView').classList.remove('active');
    document.addEventListener('keydown', sbHandleKeydown);
    requestAnimationFrame(sbAnimate);
  };

  window.sbCloseSandbox = function() {
    var overlay = document.getElementById('starSandbox');
    overlay.classList.remove('active');
    document.getElementById('sbReturnBtn').style.display = 'none';
    document.removeEventListener('keydown', sbHandleKeydown);
    sandboxElements = []; sandboxConnections = [];
    sbClickEffects = []; sbStardustTrail = []; sbEpicEvents = [];
    sandboxSelectedId = null; sandboxConnectFrom = null;
  };

  /* ===== EVENT BINDINGS ===== */
  document.getElementById('sbReturnBtn').addEventListener('click', function() {
    sbCloseSandbox();
  });

  document.querySelectorAll('#sandboxTools .tool-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      sbSetTool(btn.dataset.tool);
    });
  });

  document.getElementById('sbViewResult').addEventListener('click', function() {
    if (sandboxElements.length === 0) return;
    sbOpenViewMode();
  });

  document.getElementById('sbResultClose').addEventListener('click', sbCloseViewMode);
  document.getElementById('sbResultBack').addEventListener('click', sbCloseViewMode);
  document.getElementById('sbResultView').addEventListener('click', function(e) {
    if (e.target === this) sbCloseViewMode();
  });

  document.getElementById('sbExport').addEventListener('click', sbExportSandbox);
  document.getElementById('sbResultExport').addEventListener('click', sbExportSandbox);

  document.getElementById('sbClear').addEventListener('click', function() {
    if (sandboxElements.length === 0) return;
    sbClearSandbox();
  });

  document.getElementById('sbSupernova').addEventListener('click', function() {
    sbTriggerSupernova();
  });

  /* Window resize */
  window.addEventListener('resize', function() {
    var overlay = document.getElementById('starSandbox');
    if (overlay.classList.contains('active')) {
      sbInitCanvas();
    }
  });
})();
</script>
</body>
</html>
