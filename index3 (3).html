<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空白帧 — Blank Frame</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
input, textarea { -webkit-user-select: text; user-select: text; }
body {
  background: #06060b;
  font-family: 'PingFang SC', 'Noto Serif SC', 'STSong', 'Songti SC', serif;
  color: #ffffff;
  -webkit-font-smoothing: antialiased;
  font-size: 18px;
}

#scene {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

.scene {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 1.2s ease;
}
.scene.active { opacity: 1; pointer-events: auto; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { to { opacity: 1; } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
@keyframes breathe { 0%, 100% { transform: scale(0.95); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.7; } }
@keyframes drift { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(10px, -15px) rotate(3deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes rippleExpand {
  from { transform: scale(0); opacity: 0.6; }
  to { transform: scale(1); opacity: 0; }
}
@keyframes weatherFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
@keyframes typingPop {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.8; }
  100% { transform: scale(0); opacity: 0; }
}

/* ===== LANDING ===== */
#landing {
  background: #fff;
  cursor: pointer;
  overflow: hidden;
}

#landingTitle {
  position: absolute;
  font-size: clamp(3rem, 10vw, 7rem);
  font-weight: 200;
  letter-spacing: 0.3em;
  color: #000;
  text-align: center;
  width: 100%;
  top: 18vh;
  left: 50%;
  transform: translateX(-50%);
  transition: color 0.8s ease;
  user-select: none;
  z-index: 2;
}
#landingTitle.turn-white { color: #fff; }

#blackBall {
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  border-radius: 50%;
  background: #000;
  transform: translate(-50%, -50%);
  z-index: 1;
  pointer-events: none;
}

#wordLayer {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  overflow: hidden;
}

.fly-word {
  position: absolute;
  font-family: 'PingFang SC', serif;
  font-weight: 300;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
}

#landingParticles {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}

#landingSub {
  position: absolute;
  font-size: clamp(0.9rem, 2.5vw, 1.2rem);
  font-weight: 300;
  letter-spacing: 0.2em;
  color: #b0a8a0;
  text-align: center;
  width: 100%;
  top: 58vh;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 5;
  pointer-events: none;
}
#landingSub.visible { opacity: 1; }

#enterBtn {
  position: absolute;
  top: 66vh;
  left: 50%;
  transform: translateX(-50%);
  padding: 1.1rem 3.5rem;
  border: 1px solid rgba(200, 170, 120, 0.3);
  background: transparent;
  font-family: inherit;
  font-size: 1.05rem;
  letter-spacing: 0.18em;
  color: #c0b8b0;
  cursor: pointer;
  opacity: 0;
  transition: opacity 1s ease, all 0.6s ease;
  border-radius: 2px;
  z-index: 5;
  pointer-events: none;
}
#enterBtn.visible { opacity: 1; pointer-events: auto; }
#enterBtn:hover {
  background: rgba(200, 170, 120, 0.2);
  border-color: rgba(200, 170, 120, 0.6);
  color: #c8aa78;
  box-shadow: 0 0 30px rgba(200, 170, 120, 0.08);
}

#clickHint {
  position: absolute;
  bottom: 12vh;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.9rem;
  letter-spacing: 0.15em;
  color: #666;
  animation: pulse 2s ease-in-out infinite;
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}
#clickHint.visible { opacity: 1; }

/* ===== EMOTION INPUT ===== */
#emotionInput .card {
  background: rgba(15, 14, 18, 0.75);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(200, 170, 120, 0.2);
  border-radius: 14px; padding: 2.5rem 2.8rem;
  max-width: 600px; width: 90%;
  animation: fadeUp 0.8s ease forwards;
  position: relative;
}
#emotionInput .card h2 {
  font-size: 1.3rem; font-weight: 300;
  letter-spacing: 0.15em; color: #a09890;
  margin-bottom: 1.8rem; text-align: center;
}
#emotionInput textarea {
  width: 100%; min-height: 130px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(200, 170, 120, 0.2);
  border-radius: 10px; padding: 1.1rem 1.3rem;
  color: #e0dcd7; font-family: inherit;
  font-size: 1.1rem; line-height: 1.7;
  resize: vertical; outline: none;
  transition: border-color 0.4s ease;
  position: relative;
}
#emotionInput textarea::placeholder { color: #4a4640; }
#emotionInput textarea:focus { border-color: rgba(200, 170, 120, 0.3); }
#emotionInput .spectrum-bar {
  height: 3px; margin-top: 1rem;
  background: linear-gradient(90deg, #7080b0, #b89098, #c8a070, #90b8a0, #90a0b8, #c0a860);
  background-size: 200% 100%;
  animation: shimmer 3s linear infinite;
  border-radius: 2px; opacity: 0;
  transition: opacity 0.6s ease;
}
#emotionInput .spectrum-bar.visible { opacity: 1; }

/* Typing particle container */
.typing-particle {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  pointer-events: none;
  animation: typingPop 0.6s ease forwards;
}

.mood-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0.8rem; margin-top: 1.4rem;
}
.mood-btn {
  padding: 0.8rem 0.5rem;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.02);
  color: #b0a8a0; font-family: inherit;
  font-size: 0.95rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 8px;
  transition: all 0.3s ease; text-align: center;
}
.mood-btn:hover, .mood-btn.selected {
  border-color: rgba(200, 170, 120, 0.35);
  background: rgba(200, 170, 120, 0.08);
  color: #c8aa78;
}
#submitEmotion {
  display: block; margin: 1.6rem auto 0;
  padding: 0.85rem 2.8rem;
  border: 1px solid rgba(200, 170, 120, 0.25);
  background: rgba(200, 170, 120, 0.06);
  color: #c0b8b0; font-family: inherit;
  font-size: 1rem; letter-spacing: 0.15em;
  cursor: pointer; border-radius: 8px;
  transition: all 0.4s ease;
}
#submitEmotion:hover {
  background: rgba(200, 170, 120, 0.15);
  color: #c8aa78;
}
#skipBtn {
  display: block; margin: 0.8rem auto 0;
  padding: 0.6rem 1.8rem; border: none;
  background: none; color: #4a4640;
  font-family: inherit; font-size: 0.92rem;
  letter-spacing: 0.1em; cursor: pointer;
  transition: color 0.3s ease;
}
#skipBtn:hover { color: #6a6660; }

/* ===== MAIN SPACE ===== */
#mainSpace { width: 100%; height: 100%; position: relative; }

/* Breathing sphere - draggable */
#breathSphere {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle, rgba(200,170,120,0.25) 0%, rgba(200,170,120,0.05) 50%, transparent 70%);
  box-shadow: 0 0 60px rgba(200,170,120,0.1), 0 0 120px rgba(200,170,120,0.05);
  cursor: grab; transition: transform 0.1s ease, box-shadow 0.3s ease;
  z-index: 2; user-select: none; -webkit-user-select: none;
}
#breathSphere:active { cursor: grabbing; }
#breathSphere.pressing { transform: translate(-50%, -50%) scale(1.4); }
#breathSphere .ring {
  position: absolute; inset: -20px; border-radius: 50%;
  border: 1px solid rgba(200,170,120,0.08);
  animation: breathe 6s ease-in-out infinite;
}
#breathSphere .ring:nth-child(2) { inset: -40px; animation-delay: -2s; opacity: 0.5; }
#breathSphere .ring:nth-child(3) { inset: -60px; animation-delay: -4s; opacity: 0.3; }

#hint {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.85rem; letter-spacing: 0.12em;
  color: #c0b8b0; text-align: center;
  animation: pulse 4s ease-in-out infinite;
  white-space: nowrap; z-index: 5;
  transition: opacity 2s ease;
  pointer-events: none;
}
#hint.hidden { opacity: 0 !important; pointer-events: none; }

#returnBtn {
  padding: 0.65rem 1rem;
  border: 1px solid rgba(200, 170, 120, 0.35);
  background: rgba(20, 18, 24, 0.6);
  backdrop-filter: blur(10px);
  color: #a09890; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 6px;
  transition: all 0.3s ease;
  text-align: left;
}
#returnBtn:hover { border-color: rgba(200, 170, 120, 0.5); color: #c0b8b0; }

/* Time counter */
#timeCounter {
  position: absolute; top: 2rem; left: 50%;
  transform: translateX(-50%);
  font-size: 0.88rem; letter-spacing: 0.15em;
  color: #a09890; z-index: 3;
  text-align: center;
}
#timeCounter .time-label {
  font-size: 0.8rem; color: #908880;
  margin-bottom: 0.2rem;
}
#timeCounter .time-value {
  font-variant-numeric: tabular-nums;
}

/* ===== AUDIO MIXER ===== */
#mixer {
  position: absolute; bottom: 3rem; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center;
  gap: 1.2rem; padding: 0.8rem 1.6rem;
  background: rgba(15, 14, 18, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(200, 170, 120, 0.08);
  border-radius: 40px; z-index: 3;
}
.mixer-track { display: flex; align-items: center; gap: 0.6rem; }
.mixer-track .label {
  font-size: 0.9rem; color: #5a5650;
  letter-spacing: 0.08em; white-space: nowrap;
}
.mixer-track .icon { font-size: 1.3rem; opacity: 0.5; transition: opacity 0.3s; }
.mixer-track .icon.active { opacity: 1; }
.mixer-track img.icon { opacity: 0.5; filter: brightness(0.7); transition: all 0.3s; }
.mixer-track img.icon.active { opacity: 1; filter: brightness(1); }
.mixer-track input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 80px; height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px; outline: none; cursor: pointer;
}
.mixer-track input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: rgba(200, 170, 120, 0.5);
  border: none; cursor: pointer; transition: background 0.3s;
}
.mixer-track input[type="range"]::-webkit-slider-thumb:hover {
  background: rgba(200, 170, 120, 0.8);
}

/* ===== EMOTION HISTORY ===== */
#emotionHistory {
  position: absolute; top: 2rem; right: 2rem;
  max-width: 260px; z-index: 3;
}
#emotionHistory .history-item {
  padding: 0.6rem 1.1rem; margin-bottom: 0.4rem;
  font-size: 0.9rem; color: #5a5650;
  letter-spacing: 0.06em;
  background: rgba(15, 14, 18, 0.4);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(200, 170, 120, 0.05);
  border-radius: 8px;
  animation: fadeIn 0.8s ease forwards; opacity: 0;
}
#emotionHistory .empty-hint {
  font-size: 0.88rem; color: #908880; letter-spacing: 0.08em;
}

/* ===== FLOATING FRAGMENTS ===== */
#fragments {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 1;
  overflow: hidden;
}
.fragment {
  position: absolute;
  font-size: 0.88rem; color: rgba(100, 96, 90, 0.35);
  letter-spacing: 0.05em;
  animation: drift 12s ease-in-out infinite;
  pointer-events: none;
  white-space: nowrap;
}

/* ===== TOOLBAR ===== */
#toolbar {
  position: absolute; top: 2rem;
  left: 2rem; display: flex; flex-direction: column;
  gap: 0.5rem; z-index: 3;
}
.tool-btn {
  padding: 0.65rem 1rem;
  border: 1px solid rgba(200, 170, 120, 0.35);
  background: rgba(20, 18, 24, 0.6);
  backdrop-filter: blur(10px);
  color: #a09890; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 6px;
  transition: all 0.3s ease;
  text-align: left;
}
.tool-btn:hover { border-color: rgba(200, 170, 120, 0.5); color: #c0b8b0; }
.tool-btn.active { border-color: rgba(200, 170, 120, 0.55); color: #c8aa78; background: rgba(200, 170, 120, 0.12); }
.tool-collect-btn {
  display: block; text-decoration: none;
  line-height: 1.4;
}

/* ===== BREATHING GUIDE OVERLAY ===== */
#breathGuide {
  position: fixed; inset: 0;
  z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity 0.8s ease;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
#breathGuide.active { opacity: 1; pointer-events: auto; }
#breathGuide .guide-text {
  font-size: clamp(1.5rem, 3.5vw, 2.2rem);
  font-weight: 300; letter-spacing: 0.2em;
  color: #c8aa78;
  margin-bottom: 2rem;
  min-height: 3rem;
}
#breathGuide .guide-circle {
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 1.5px solid rgba(200, 170, 120, 0.3);
  transition: transform 4s ease-in-out;
  position: relative;
}
#breathGuide .guide-circle.inhale { transform: scale(1.5); }
#breathGuide .guide-circle.hold { transform: scale(1.5); }
#breathGuide .guide-circle.exhale { transform: scale(1); }
#breathGuide .guide-text-small {
  font-size: 0.9rem; color: #5a5650;
  margin-top: 1rem; letter-spacing: 0.1em;
}
#breathGuide .close-guide {
  position: absolute; top: 2rem; right: 2rem;
  padding: 0.55rem 1.2rem; border: 1px solid rgba(200, 170, 120, 0.2);
  background: rgba(15, 14, 18, 0.6); backdrop-filter: blur(10px);
  color: #b0a8a0; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.1em;
  cursor: pointer; border-radius: 6px; z-index: 21;
  pointer-events: auto;
}

/* ===== ZEN GARDEN ===== */
#zenGarden {
  position: absolute; inset: 0;
  z-index: 2; pointer-events: none;
}

/* ===== ZEN TOOLBAR ===== */
#zenToolbar {
  position: fixed;
  top: 2rem; left: 50%;
  transform: translateX(-50%);
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: rgba(15, 14, 18, 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(200, 170, 120, 0.08);
  border-radius: 20px;
  z-index: 50;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#zenToolbar.active {
  opacity: 1; pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.zen-tool-btn {
  padding: 0.45rem 0.9rem;
  border: 1px solid rgba(200, 170, 120, 0.15);
  background: rgba(15, 14, 18, 0.5);
  backdrop-filter: blur(8px);
  color: #908880; font-family: inherit;
  font-size: 0.82rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 14px;
  transition: all 0.25s ease; white-space: nowrap;
}
.zen-tool-btn:hover {
  border-color: rgba(200, 170, 120, 0.45);
  color: #c0b8b0; background: rgba(200, 170, 120, 0.08);
}
.zen-tool-btn:active {
  transform: scale(0.95);
}
.zen-tool-btn#zenClose:hover {
  border-color: rgba(200, 120, 120, 0.5);
  color: #d09898;
}

/* ===== SEASON SELECTOR ===== */
#seasonSelector {
  position: absolute; bottom: 8rem; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 0.6rem;
  padding: 0.5rem 1rem;
  background: rgba(15, 14, 18, 0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(200, 170, 120, 0.06);
  border-radius: 30px; z-index: 3;
}
.season-btn {
  padding: 0.45rem 1rem;
  border: none; background: none;
  color: #a09890; font-family: inherit;
  font-size: 0.85rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 14px;
  transition: all 0.3s ease;
}
.season-btn:hover { color: #c0b8b0; }
.season-btn.active { color: #c8aa78; background: rgba(200, 170, 120, 0.2); }

/* ===== DISSOLVE OVERLAY ===== */
#dissolveOverlay {
  position: fixed; inset: 0;
  z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 0.6s ease;
}
#dissolveOverlay.active { opacity: 1; }

/* ===== MELODY TOGGLE ===== */
#melodyToggle {
  padding: 0.65rem 1rem;
  border: 1px solid rgba(200, 170, 120, 0.35);
  background: rgba(20, 18, 24, 0.6);
  backdrop-filter: blur(10px);
  color: #a09890; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 6px;
  transition: all 0.3s ease;
  text-align: left;
}
#melodyToggle:hover { border-color: rgba(200, 170, 120, 0.5); color: #c0b8b0; }
#melodyToggle.active { color: #c8aa78; border-color: rgba(200, 170, 120, 0.55); background: rgba(200, 170, 120, 0.12); }

/* ===== RIPPLE ===== */
.ripple {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(200, 170, 120, 0.3);
  pointer-events: none;
  animation: rippleExpand 1.5s ease-out forwards;
  z-index: 1;
}

/* ===== EMOTIONAL WEATHER ===== */
#weatherWidget {
  position: absolute;
  bottom: 8rem; left: 2rem;
  padding: 0.6rem 1rem;
  background: rgba(15, 14, 18, 0.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(200, 170, 120, 0.06);
  border-radius: 8px;
  z-index: 3;
  text-align: center;
  min-width: 80px;
}
#weatherWidget .weather-icon {
  font-size: 1.8rem;
  animation: weatherFloat 3s ease-in-out infinite;
}
#weatherWidget .weather-label {
  font-size: 0.82rem;
  color: #b0a8a0;
  letter-spacing: 0.08em;
  margin-top: 0.2rem;
}

/* ===== BREATHING PATTERN SELECTOR ===== */
#breathPatternSelector {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  justify-content: center;
}
.breath-pattern-btn {
  padding: 0.5rem 1rem;
  border: 1px solid rgba(200, 170, 120, 0.15);
  background: rgba(255,255,255,0.02);
  color: #ffffff; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.08em;
  cursor: pointer; border-radius: 24px;
  transition: all 0.3s ease;
}
.breath-pattern-btn:hover { border-color: rgba(200, 170, 120, 0.3); color: #f0ede8; }
.breath-pattern-btn.active { border-color: rgba(200, 170, 120, 0.5); color: #c8aa78; background: rgba(200, 170, 120, 0.2); }

/* ===== AUDIO PRESET BUTTONS ===== */
#presets {
  position: absolute; bottom: 8rem;
  right: 2rem;
  display: flex; flex-direction: column;
  gap: 0.3rem; z-index: 3;
}
.preset-btn {
  padding: 0.45rem 0.9rem;
  border: 1px solid rgba(200, 170, 120, 0.08);
  background: rgba(15, 14, 18, 0.4);
  backdrop-filter: blur(10px);
  color: #a09890; font-family: inherit;
  font-size: 0.82rem; letter-spacing: 0.06em;
  cursor: pointer; border-radius: 14px;
  transition: all 0.3s ease;
  text-align: left;
}
.preset-btn:hover { border-color: rgba(200, 170, 120, 0.3); color: #c0b8b0; }
.preset-btn.active { color: #c8aa78; border-color: rgba(200, 170, 120, 0.4); }

/* ===== GENERATIVE ART TOAST ===== */
#saveToast {
  position: fixed;
  bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 0.6rem 1.4rem;
  background: rgba(15, 14, 18, 0.8);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(200, 170, 120, 0.15);
  border-radius: 8px;
  color: #ffffff; font-family: inherit;
  font-size: 0.88rem; letter-spacing: 0.1em;
  z-index: 30; opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
}
#saveToast.visible {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ===== SHOOTING STARS ===== */
.shooting-star {
  position: absolute;
  pointer-events: auto;
  z-index: 2;
  cursor: pointer;
}
.shooting-star .star-core {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 8px 2px rgba(255,255,255,0.8), 0 0 20px 4px rgba(200,170,120,0.4);
}

}

<canvas id="scene"></canvas>

<script>
(function() {
  'use strict';

  var PARTICLE_COUNT = 300;
  var MOOD_COLORS = {
    tired:   ['#8a8078', '#6a6560', '#a09890'],
    anxious: ['#b89098', '#a08088', '#c8a0a8'],

    angry:   ['#b87878', '#a86868', '#c88888'],
    hopeful: ['#c8aa78', '#d8b888', '#b89868']
  };

  var PENTATONIC = [
    130.81, 146.83, 164.81, 196.00, 220.00,
    261.63, 293.66, 329.63, 392.00, 440.00,
    523.25, 587.33, 659.25, 783.99, 880.00
  ];

  var LANDING_PHRASES = [
    {id: 1, text: "在这里，允许你'什么都不做'。"},
    {id: 2, text: "你不需要变好，你只需要在这里待一会儿。"},
    {id: 3, text: "所有App都在让你'变得更好'，只有这里让你'不用变'。"},
    {id: 4, text: "不分析你为什么不开心，不教你如何变快乐，只是安静地接住你的'累''空''烦'。"},
    {id: 5, text: "你随手画的一条线，会变成一片星云里的一颗星。"},
    {id: 6, text: "累了就停一停，世界上没有非走不可的路。"},
    {id: 7, text: "有时候发呆不是在浪费时间，是在陪自己。"},
    {id: 8, text: "不必对'放松'感到内疚，那不是偷懒，是修复。"},
    {id: 9, text: "感到焦虑的时候，深呼吸一下，你还是安全的。"}
  ];

  var currentScene = 'landing';
  var selectedMoods = [];
  var emotionHistory = [];
  var isBreathPressing = false;
  var breathPhase = 0;
  var mouseX = 0, mouseY = 0;
  var mouseDown = false;
  var dissolveParticles = [];
  var dissolving = false;
  var spaceStartTime = null;
  var currentSeason = 'spring';
  var zenMode = false;
  var zenDrawing = false;
  var zenPoints = [];
  var melodyOn = false;
  var fragmentWords = [];
  var ripples = [];
  var breathGuideActive = false;
  var breathGuideTimer = null;
  var breathPattern = '478';
  var sphereX = 0, sphereY = 0;
  var sphereDragging = false;
  var sphereDragOffX = 0, sphereDragOffY = 0;

  var SEASONS = {
    spring: {
      colors: ['#90b8a0', '#80a890', '#a0c8b0', '#c8aa78', '#90a890'],
      bgCenter: 'rgba(15, 22, 18, 1)', bgEdge: 'rgba(6, 6, 11, 1)',
      particleVx: 0.1, particleVy: -0.05,
      weatherIcon: '', weatherLabel: '心绪如春'
    },
    summer: {
      colors: ['#c8aa78', '#d8b888', '#b89868', '#e0c898', '#c8a070'],
      bgCenter: 'rgba(22, 18, 12, 1)', bgEdge: 'rgba(6, 6, 11, 1)',
      particleVx: 0.05, particleVy: -0.1,
      weatherIcon: '', weatherLabel: '静谧夏夜'
    },
    autumn: {
      colors: ['#c8a070', '#b08060', '#a87050', '#d8a878', '#c09068'],
      bgCenter: 'rgba(22, 16, 12, 1)', bgEdge: 'rgba(6, 6, 11, 1)',
      particleVx: -0.1, particleVy: 0.1,
      weatherIcon: '🍂', weatherLabel: '秋风微凉'
    },
    winter: {
      colors: ['#88a0b8', '#7090a8', '#90a8b8', '#a0b8c8', '#8098a8'],
      bgCenter: 'rgba(12, 14, 20, 1)', bgEdge: 'rgba(6, 6, 11, 1)',
      particleVx: 0.02, particleVy: 0.15,
      weatherIcon: '❄', weatherLabel: '冬雪无声'
    }
  };

  var AUDIO_PRESETS = {
    springRain: { rain: 65, wind: 25, crickets: 0, night: 0 },
    summerNight: { rain: 0, wind: 5, crickets: 70, night: 40 },
    autumnWind: { rain: 0, wind: 75, crickets: 0, night: 0 }
  };

  var cv = document.getElementById('scene');
  var ctx = cv.getContext('2d');
  var W = 0, H = 0, dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    var zenCv = document.getElementById('zenGarden');
    zenCv.width = W * dpr; zenCv.height = H * dpr;
    zenCv.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    /* Center sphere if not yet positioned */
    if (W > 0 && H > 0 && sphereX === 0 && sphereY === 0) {
      sphereX = W / 2; sphereY = H / 2;
      updateSpherePosition();
    }
  }
  window.addEventListener('resize', resize);
  /* Defer first resize to ensure DOM is ready */
  requestAnimationFrame(function() { resize(); });

  /* ===== LANDING ANIMATION ===== */
  var FLY_WORDS = ['难过','焦虑','疲惫','迷茫','孤独','空虚','无力','委屈','压抑','低落'];
  var landingClicked = false;
  var landingParticleCtx = null;
  var landingParticlesArr = [];
  var landingParticleRAF = null;
  var flyWordLoopTimer = null;

  /* Setup landing particle canvas — constellation cluster effect */
  (function() {
    var canvas = document.getElementById('landingParticles');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.position = 'absolute';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    landingParticleCtx = canvas.getContext('2d');

    var LINE_DIST = 85;
    var COLORS = ['#ffffff', '#f5e6c8', '#d4c5a9', '#c8aa78', '#b8d4e3', '#a0c4d4', '#e8d5b7', '#c8d8e8', '#f0e0c0', '#e0d8d0'];

    /* Create particles: some in clusters, some scattered */
    var clusterCenters = [];
    var numClusters = 4 + Math.floor(Math.random() * 3);
    for (var c = 0; c < numClusters; c++) {
      clusterCenters.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        spread: 60 + Math.random() * 100
      });
    }

    /* Cluster particles */
    for (var i = 0; i < 250; i++) {
      var cluster = clusterCenters[Math.floor(Math.random() * clusterCenters.length)];
      var angle = Math.random() * Math.PI * 2;
      var r = Math.random() * cluster.spread;
      landingParticlesArr.push({
        x: cluster.x + Math.cos(angle) * r,
        y: cluster.y + Math.sin(angle) * r,
        size: Math.random() * 2.5 + 0.5,
        opacity: Math.random() * 0.25 + 0.05,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        phase: Math.random() * Math.PI * 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }

    /* Scattered particles */
    for (var i = 0; i < 150; i++) {
      landingParticlesArr.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.8 + 0.3,
        opacity: Math.random() * 0.15 + 0.03,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        phase: Math.random() * Math.PI * 2,
        color: COLORS[Math.floor(Math.random() * COLORS.length)]
      });
    }

    function animateLandingParticles() {
      if (!landingParticleCtx) return;
      landingParticleCtx.clearRect(0, 0, canvas.width, canvas.height);

      var now = Date.now();

      /* Draw connection lines first */
      for (var i = 0; i < landingParticlesArr.length; i++) {
        var a = landingParticlesArr[i];
        a.x += a.vx;
        a.y += a.vy;

        /* Wrap around edges */
        if (a.x < 0) a.x = canvas.width;
        if (a.x > canvas.width) a.x = 0;
        if (a.y < 0) a.y = canvas.height;
        if (a.y > canvas.height) a.y = 0;

        for (var j = i + 1; j < landingParticlesArr.length; j++) {
          var b = landingParticlesArr[j];
          var ddx = a.x - b.x, ddy = a.y - b.y;
          var sqDist = ddx * ddx + ddy * ddy;
          if (sqDist < LINE_DIST * LINE_DIST) {
            var d = Math.sqrt(sqDist);
            var lineAlpha = (1 - d / LINE_DIST) * 0.08;
            landingParticleCtx.globalAlpha = lineAlpha;
            landingParticleCtx.strokeStyle = a.color;
            landingParticleCtx.lineWidth = 0.6;
            landingParticleCtx.beginPath();
            landingParticleCtx.moveTo(a.x, a.y);
            landingParticleCtx.lineTo(b.x, b.y);
            landingParticleCtx.stroke();
          }
        }
      }

      /* Draw particles with glow */
      for (var i = 0; i < landingParticlesArr.length; i++) {
        var p = landingParticlesArr[i];
        var alpha = p.opacity * (0.6 + 0.4 * Math.sin(p.phase + now * 0.001));
        landingParticleCtx.globalAlpha = alpha;
        landingParticleCtx.fillStyle = p.color;
        if (p.size > 1.5) {
          landingParticleCtx.shadowColor = p.color;
          landingParticleCtx.shadowBlur = p.size * 5;
        }
        landingParticleCtx.beginPath();
        landingParticleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        landingParticleCtx.fill();
      }

      landingParticleCtx.globalAlpha = 1;
      landingParticleCtx.shadowBlur = 0;
      landingParticleRAF = requestAnimationFrame(animateLandingParticles);
    }
    animateLandingParticles();
  })();

  /* Show "轻触屏幕" hint after brief delay — only in initial state */
  setTimeout(function() {
    document.getElementById('clickHint').classList.add('visible');
  }, 1500);

  /* Landing click handler */
  document.getElementById('landing').addEventListener('click', function(e) {
    if (landingClicked) return;
    if (e.target.id === 'enterBtn') return;
    landingClicked = true;
    document.getElementById('clickHint').classList.remove('visible');
    document.getElementById('clickHint').style.display = 'none';

    var titleEl = document.getElementById('landingTitle');
    var ballEl = document.getElementById('blackBall');
    var wordLayer = document.getElementById('wordLayer');
    var landingSub = document.getElementById('landingSub');
    var enterBtn = document.getElementById('enterBtn');

    /* Step 1: Move title to center (slightly above) */
    titleEl.style.transition = 'top 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), color 0.8s ease';
    titleEl.style.top = '45%';
    titleEl.style.transform = 'translate(-50%, -50%)';

    /* Step 2: After title moves, show black ball expanding + words flying */
    setTimeout(function() {
      /* Title turns white as ball expands */
      titleEl.classList.add('turn-white');

      /* Black ball grows */
      var maxDim = Math.max(window.innerWidth, window.innerHeight) * 3;
      var ballDuration = 2500;
      var ballStart = Date.now();

      function animateBall() {
        var elapsed = Date.now() - ballStart;
        var progress = Math.min(elapsed / ballDuration, 1);
        var ease = 1 - Math.pow(1 - progress, 3);
        var size = ease * maxDim;
        ballEl.style.width = size + 'px';
        ballEl.style.height = size + 'px';

        if (progress < 1) {
          requestAnimationFrame(animateBall);
        }
      }
      animateBall();

      /* Start continuous fly word loop */
      startFlyWordLoop(wordLayer);

      /* Step 3: Show subtitle and button while words keep cycling */
      setTimeout(function() {
        var phrase = LANDING_PHRASES[Math.floor(Math.random() * LANDING_PHRASES.length)];
        landingSub.textContent = phrase.text;
        landingSub.classList.add('visible');
        enterBtn.classList.add('visible');
      }, ballDuration * 0.65);

    }, 1200);
  });

  function startFlyWordLoop(container) {
    /* Launch all words with stagger, then repeat */
    function launchBatch() {
      for (var i = 0; i < FLY_WORDS.length; i++) {
        (function(word, idx) {
          setTimeout(function() {
            createFlyWord(container, word);
          }, idx * 100); /* slower stagger: 100ms between each */
        })(FLY_WORDS[i], i);
      }
    }

    /* First batch immediately */
    launchBatch();

    /* Repeat every 1 second for continuous flow */
    flyWordLoopTimer = setInterval(launchBatch, 1000);
  }

  var WORD_COLORS = ['#c47878', '#9a8a6a', '#8a9a8a', '#7a8a9a', '#a08a78', '#8a7a8a', '#9a7a6a', '#6a9a8a'];

  function createFlyWord(container, word) {
    var el = document.createElement('div');
    el.className = 'fly-word';
    el.textContent = word;

    var vw = window.innerWidth;
    var vh = window.innerHeight;

    /* Pre-calculate ALL random values once — no jitter */
    var fontSize = 1.2 + Math.random() * 1.5;
    var edge = Math.floor(Math.random() * 4);
    var startX, startY;
    switch(edge) {
      case 0: startX = Math.random() * vw; startY = -60; break;
      case 1: startX = vw + 60; startY = Math.random() * vh; break;
      case 2: startX = Math.random() * vw; startY = vh + 60; break;
      case 3: startX = -60; startY = Math.random() * vh; break;
    }
    var startScale = 1.5 + Math.random() * 2; /* start big */
    var duration = 2800 + Math.random() * 1200;
    var rotation = (Math.random() - 0.5) * 600;
    var wordColor = WORD_COLORS[Math.floor(Math.random() * WORD_COLORS.length)];

    el.style.fontSize = fontSize + 'rem';
    el.style.color = wordColor;
    el.style.textShadow = '0 0 6px ' + wordColor;
    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.opacity = '0.4';
    el.style.transform = 'translate(-50%, -50%) scale(' + startScale + ') rotate(' + rotation * 0 + 'deg)';
    container.appendChild(el);

    var centerX = vw / 2;
    var centerY = vh / 2;
    var start = Date.now();

    function animateWord() {
      var elapsed = Date.now() - start;
      var progress = Math.min(elapsed / duration, 1);

      /* Linear: start big, shrink toward center, fade out */
      var scale = startScale * (1 - progress);
      var curX = startX + (centerX - startX) * progress;
      var curY = startY + (centerY - startY) * progress;
      var curRotation = rotation * progress;
      var opacity = 0.4 * (1 - progress);

      el.style.opacity = Math.max(opacity, 0);
      el.style.transform = 'translate(-50%, -50%) scale(' + scale + ') rotate(' + curRotation + 'deg)';
      el.style.left = curX + 'px';
      el.style.top = curY + 'px';

      if (progress < 1) {
        requestAnimationFrame(animateWord);
      } else {
        if (el.parentNode) el.parentNode.removeChild(el);
      }
    }
    animateWord();
  }

  var particles = [];

  function createParticle(opts) {
    var colors = opts.colors || SEASONS[currentSeason].colors;
    return {
      x: opts.x || Math.random() * W,
      y: opts.y || Math.random() * H,
      vx: opts.vx || (Math.random() - 0.5) * SEASONS[currentSeason].particleVx * 2,
      vy: opts.vy || (Math.random() - 0.5) * SEASONS[currentSeason].particleVy * 2,
      size: opts.size || (Math.random() * 2 + 0.5),
      opacity: opts.opacity || (Math.random() * 0.2 + 0.04),
      baseOpacity: opts.opacity || (Math.random() * 0.2 + 0.04),
      phase: opts.phase || Math.random() * Math.PI * 2,
      color: opts.color || colors[Math.floor(Math.random() * colors.length)],
      life: opts.life || Infinity, decay: opts.decay || 0, maxLife: opts.maxLife || Infinity
    };
  }

  for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle({}));

  function getTimeDilation() {
    if (!spaceStartTime) return 1;
    var mins = (Date.now() - spaceStartTime) / 60000;
    return Math.max(0.15, 1 - mins * 0.02);
  }

  function updateParticles(dt) {
    var dil = getTimeDilation();
    var effDt = dt * dil;
    var cx = sphereX || W / 2, cy = sphereY || H / 2;
    var attractForce = isBreathPressing ? 0.00008 : 0.00002;
    var scatterForce = isBreathPressing ? 0.0003 : 0;

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx * dil;
      p.y += p.vy * dil;
      p.x += Math.sin(p.phase + effDt * 0.0003) * 0.06;
      p.y += Math.cos(p.phase + effDt * 0.0004) * 0.04;

      var dx = cx - p.x, dy = cy - p.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 1) {
        if (isBreathPressing) {
          p.vx -= (dx / dist) * scatterForce * 200;
          p.vy -= (dy / dist) * scatterForce * 200;
        } else {
          p.vx += (dx / dist) * attractForce * 200;
          p.vy += (dy / dist) * attractForce * 200;
        }
      }

      /* Ripple push */
      for (var r = 0; r < ripples.length; r++) {
        var rip = ripples[r];
        var rdx = p.x - rip.x, rdy = p.y - rip.y;
        var rdist = Math.sqrt(rdx * rdx + rdy * rdy);
        if (rdist < rip.radius + 30 && rdist > rip.radius - 30) {
          p.vx += (rdx / rdist) * 0.15;
          p.vy += (rdy / rdist) * 0.15;
        }
      }

      if (mouseDown) {
        var mdx = p.x - mouseX, mdy = p.y - mouseY;
        var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (mdist < 150 && mdist > 0) {
          p.vx += (mdx / mdist) * 0.08;
          p.vy += (mdy / mdist) * 0.08;
        }
      }

      p.vx *= 0.998; p.vy *= 0.998;
      var m = 50;
      if (p.x < -m) p.x = W + m;
      if (p.x > W + m) p.x = -m;
      if (p.y < -m) p.y = H + m;
      if (p.y > H + m) p.y = -m;

      p.opacity = p.baseOpacity * (0.6 + 0.4 * Math.sin(p.phase + effDt * 0.001));

      if (p.life !== Infinity) {
        p.life -= effDt;
        if (p.life <= 0) { particles.splice(i, 1); i--; continue; }
        if (p.life < p.maxLife * 0.3) p.opacity *= (p.life / (p.maxLife * 0.3));
      }
    }

    /* Update ripples */
    for (var r = 0; r < ripples.length; r++) {
      ripples[r].radius += 3;
      ripples[r].life -= dt;
    }
    ripples = ripples.filter(function(r) { return r.life > 0; });
  }

  function drawParticles() {
    var lineDist = 80;
    for (var i = 0; i < particles.length; i++) {
      var a = particles[i];
      if (a.opacity < 0.01) continue;
      for (var j = i + 1; j < particles.length; j++) {
        var b = particles[j];
        if (b.opacity < 0.01) continue;
        var dx = a.x - b.x, dy = a.y - b.y;
        var dist = dx * dx + dy * dy;
        if (dist < lineDist * lineDist) {
          var alpha = (1 - Math.sqrt(dist) / lineDist) * 0.06 * Math.min(a.opacity, b.opacity) * 5;
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = a.color;
          ctx.lineWidth = 0.5;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.opacity < 0.005) continue;
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      if (p.size > 1.5) { ctx.shadowColor = p.color; ctx.shadowBlur = p.size * 4; }
      else { ctx.shadowBlur = 0; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  function drawRipples() {
    for (var i = 0; i < ripples.length; i++) {
      var r = ripples[i];
      var alpha = (r.life / 1500) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = 'rgba(200, 170, 120, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function initAudioElement(url) {

    loadedAudioElements[url] = audio;

  function initAudio() {
    if (audioInitialized) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioInitialized = true;

    var bufferSize = 2 * audioCtx.sampleRate;
    var noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var output = noiseBuffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

    var pinkBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    var pinkData = pinkBuffer.getChannelData(0);
    var b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
    for (var i = 0; i < bufferSize; i++) {
      var white = Math.random() * 2 - 1;
      b0 = 0.99886*b0 + white*0.0555179; b1 = 0.99332*b1 + white*0.0750759;
      b2 = 0.96900*b2 + white*0.1538520; b3 = 0.86650*b3 + white*0.3104856;
      b4 = 0.55000*b4 + white*0.5329522; b5 = -0.7616*b5 - white*0.0168980;
      pinkData[i] = (b0+b1+b2+b3+b4+b5+b6+white*0.5362)*0.11;

  function startMelody() {
    if (!audioCtx) initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (melodyOn) return; /* already playing */
    melodyOn = true;

    melodyGainNode = audioCtx.createGain();
    melodyGainNode.gain.value = 0.06;
    melodyGainNode.connect(audioCtx.destination);

    var melodyGain = melodyGainNode;

    function playNote() {
      if (!melodyOn) return;
      var freq = PENTATONIC[Math.floor(Math.random() * PENTATONIC.length)];
      var osc = audioCtx.createOscillator();
      var noteGain = audioCtx.createGain();
      var filter = audioCtx.createBiquadFilter();
      osc.type = 'sine'; osc.frequency.value = freq;
      filter.type = 'lowpass'; filter.frequency.value = 2000;
      var now = audioCtx.currentTime;
      noteGain.gain.setValueAtTime(0, now);
      noteGain.gain.linearRampToValueAtTime(0.15, now + 0.3);
      noteGain.gain.exponentialRampToValueAtTime(0.001, now + 3);
      osc.connect(filter); filter.connect(noteGain); noteGain.connect(melodyGain);
      osc.start(now); osc.stop(now + 3);
    }

    var chord = [PENTATONIC[4], PENTATONIC[7], PENTATONIC[9]];
    chord.forEach(function(freq) {
      var osc = audioCtx.createOscillator();
      var noteGain = audioCtx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      noteGain.gain.value = 0.04;
      osc.connect(noteGain); noteGain.connect(melodyGain);
      osc.start(); melodyNodes.push({ osc: osc, gain: noteGain });
    });
    melodyInterval = setInterval(playNote, 2000 + Math.random() * 3000);
  }

  function stopMelody() {
    melodyOn = false;
    if (melodyInterval) { clearInterval(melodyInterval); melodyInterval = null; }
    melodyNodes.forEach(function(n) { try { n.osc.stop(); } catch(e) {} });
    melodyNodes = [];
    if (melodyGainNode) {
      melodyGainNode.disconnect();
      melodyGainNode = null;
    }
  }

  function triggerDissolve(entry) {
    var overlay = document.getElementById('dissolveOverlay');
    var octx = overlay.getContext('2d');
    overlay.width = W * dpr; overlay.height = H * dpr;
    octx.setTransform(dpr, 0, 0, dpr, 0, 0);
    overlay.classList.add('active');

    var colors = MOOD_COLORS[entry.mood] || MOOD_COLORS.calm;
    var dp = [];
    for (var i = 0; i < 120; i++) {
      dp.push({
        x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*60,
        vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*2-1,
        size: Math.random()*2.5+0.5, opacity: Math.random()*0.6+0.3,
        color: colors[Math.floor(Math.random()*colors.length)],
        life: 1, decay: 0.005+Math.random()*0.008, maxLife: 1
      });
    }
    dissolving = true;
    var dissolveStart = Date.now();

    function animateDissolve() {
      if (!dissolving) return;
      var elapsed = Date.now() - dissolveStart;
      if (elapsed > 2000) {
        dissolving = false; overlay.classList.remove('active');
        dp.forEach(function(p) {
          particles.push(createParticle({
            x: p.x, y: p.y, size: p.size*0.8, opacity: p.opacity*0.5,
            color: p.color, life: 15000, maxLife: 15000

        });
        return;

      octx.clearRect(0, 0, W, H);
      for (var i = 0; i < dp.length; i++) {
        var p = dp[i];
        p.x += p.vx; p.y += p.vy; p.vy -= 0.02;
        p.opacity -= p.decay; p.vx *= 0.99;

        octx.globalAlpha = Math.max(0, p.opacity);

        octx.beginPath(); octx.arc(p.x, p.y, p.size, 0, Math.PI*2); octx.fill();
      }
      octx.shadowBlur = 0; octx.globalAlpha = 1;
      requestAnimationFrame(animateDissolve);
    }
    animateDissolve();
  }

  function redrawZenStrokes() {
    zctx.clearRect(0, 0, W, H);
    for (var s = 0; s < zenStrokes.length; s++) {
      var pts = zenStrokes[s];
      if (pts.length < 2) continue;
      zctx.beginPath(); zctx.moveTo(pts[0].x, pts[0].y);
      for (var p = 1; p < pts.length; p++) {
        zctx.lineTo(pts[p].x, pts[p].y);
      }
      zctx.strokeStyle = 'rgba(200, 170, 120, 0.12)';
      zctx.lineWidth = 2; zctx.lineCap = 'round';
      zctx.stroke();
      /* re-draw the sparkle dots for each point */
      for (var i = 1; i < pts.length; i++) {
        for (var d = 0; d < 3; d++) {
          zctx.beginPath();
          zctx.arc(pts[i].x+(Math.random()-0.5)*10, pts[i].y+(Math.random()-0.5)*10, Math.random()*1.5+0.5, 0, Math.PI*2);
          zctx.fillStyle = 'rgba(200, 170, 120, 0.1)'; zctx.fill();
        }
      }
    }
  }

  function drawZenTrail() {
    if (zenCurrentStroke.length < 2) return;
    var last = zenCurrentStroke[zenCurrentStroke.length - 2];
    var curr = zenCurrentStroke[zenCurrentStroke.length - 1];
    zctx.beginPath(); zctx.moveTo(last.x, last.y); zctx.lineTo(curr.x, curr.y);
    zctx.strokeStyle = 'rgba(200, 170, 120, 0.12)'; zctx.lineWidth = 2; zctx.lineCap = 'round'; zctx.stroke();
    for (var i = 0; i < 3; i++) {
      zctx.beginPath();
      zctx.arc(curr.x+(Math.random()-0.5)*10, curr.y+(Math.random()-0.5)*10, Math.random()*1.5+0.5, 0, Math.PI*2);
      zctx.fillStyle = 'rgba(200, 170, 120, 0.1)'; zctx.fill();
    }
  }

  function getZenCoords(e) {
    var rect = zenCv.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (W / rect.width),
      y: (e.clientY - rect.top) * (H / rect.height)
    };
  }

  zenCv.addEventListener('mousedown', function(e) {
    if (!zenMode) return;
    var c = getZenCoords(e);
    zenDrawing = true;
    zenCurrentStroke = [{ x: c.x, y: c.y }];
  });
  zenCv.addEventListener('mousemove', function(e) {
    if (!zenMode || !zenDrawing) return;
    var c = getZenCoords(e);
    zenCurrentStroke.push({ x: c.x, y: c.y });
    drawZenTrail();
  });
  zenCv.addEventListener('mouseup', function() {
    if (!zenDrawing) return;
    zenDrawing = false;
    if (zenCurrentStroke.length > 1) zenStrokes.push(zenCurrentStroke);
    zenCurrentStroke = [];
  });
  zenCv.addEventListener('touchstart', function(e) {
    if (!zenMode) return;
    zenDrawing = true;
    var c = getZenCoords(e.touches[0]);

  /* Zen save */
  document.getElementById('zenSave').addEventListener('click', function() {
    var cardW = 800;
    var cardH = 600;
    var pad = 40;
    var paintW = cardW - pad * 2;
    var paintH = cardH - pad * 2 - 70;

    var expCv = document.createElement('canvas');
    expCv.width = cardW * 2;
    expCv.height = cardH * 2;
    var ectx = expCv.getContext('2d');
    ectx.scale(2, 2);

    /* Card background */
    var cGrad = ectx.createLinearGradient(0, 0, cardW, cardH);
    cGrad.addColorStop(0, '#161210');
    cGrad.addColorStop(1, '#0e0c0a');
    ectx.fillStyle = cGrad;
    ectx.fillRect(0, 0, cardW, cardH);

    /* Border */
    ectx.strokeStyle = 'rgba(200, 170, 120, 0.15)';
    ectx.lineWidth = 1;
    ectx.strokeRect(1, 1, cardW - 2, cardH - 2);

    /* Painting area background */
    var paintGrad = ectx.createRadialGradient(pad + paintW / 2, pad + paintH / 2, 0, pad + paintW / 2, pad + paintH / 2, Math.max(paintW, paintH) * 0.5);
    paintGrad.addColorStop(0, '#1a1816');
    paintGrad.addColorStop(1, '#100e0c');
    ectx.fillStyle = paintGrad;
    ectx.fillRect(pad, pad, paintW, paintH);

    /* Painting border */
    ectx.strokeStyle = 'rgba(200, 170, 120, 0.12)';
    ectx.strokeRect(pad, pad, paintW, paintH);

    /* Background stars in painting area */
    for (var i = 0; i < 150; i++) {
      var bx = pad + Math.random() * paintW, by = pad + Math.random() * paintH;
      var br2 = 0.3 + Math.random() * 1;
      ectx.globalAlpha = 0.15 + Math.random() * 0.3;
      ectx.fillStyle = Math.random() > 0.7 ? '#a0c0e0' : '#fff';
      ectx.beginPath(); ectx.arc(bx, by, br2, 0, Math.PI * 2); ectx.fill();
    }
    ectx.globalAlpha = 1;

    /* Compute bounds of strokes to center them */
    var minX = W, minY = H, maxX = 0, maxY = 0;
    for (var s = 0; s < zenStrokes.length; s++) {
      var pts = zenStrokes[s];
      for (var p = 0; p < pts.length; p++) {
        if (pts[p].x < minX) minX = pts[p].x;
        if (pts[p].y < minY) minY = pts[p].y;
        if (pts[p].x > maxX) maxX = pts[p].x;
        if (pts[p].y > maxY) maxY = pts[p].y;
      }
    }
    var strokeW = maxX - minX || 1;
    var strokeH = maxY - minY || 1;
    var scale = Math.min(paintW / strokeW, paintH / strokeH, 1.5);
    var offsetX = pad + (paintW - strokeW * scale) / 2;
    var offsetY = pad + (paintH - strokeH * scale) / 2;

    /* Zen strokes */
    for (var s = 0; s < zenStrokes.length; s++) {
      var pts = zenStrokes[s];
      if (pts.length < 2) continue;
      ectx.globalAlpha = 1;
      ectx.beginPath();
      ectx.moveTo(offsetX + (pts[0].x - minX) * scale, offsetY + (pts[0].y - minY) * scale);
      for (var p = 1; p < pts.length; p++) {
        ectx.lineTo(offsetX + (pts[p].x - minX) * scale, offsetY + (pts[p].y - minY) * scale);
      }
      ectx.strokeStyle = 'rgba(200, 170, 120, 0.22)';
      ectx.lineWidth = 2;
      ectx.lineCap = 'round';
      ectx.lineJoin = 'round';
      ectx.stroke();

      /* Sparkle dots */
      for (var d = 0; d < pts.length; d += 3) {
        ectx.globalAlpha = 0.12 + Math.random() * 0.12;
        ectx.fillStyle = '#c8aa78';
        ectx.beginPath();
        ectx.arc(offsetX + (pts[d].x - minX) * scale + (Math.random() - 0.5) * 4,
                 offsetY + (pts[d].y - minY) * scale + (Math.random() - 0.5) * 4,
                 Math.random() * 1.5 + 0.3, 0, Math.PI * 2);
        ectx.fill();
      }
    }
    ectx.globalAlpha = 1;

    /* Bottom area: title and date */
    var bottomY = pad + paintH + 20;

    /* Divider */
    var divGrad = ectx.createLinearGradient(pad, 0, pad + paintW, 0);
    divGrad.addColorStop(0, 'transparent');
    divGrad.addColorStop(0.5, 'rgba(200, 170, 120, 0.2)');
    divGrad.addColorStop(1, 'transparent');
    ectx.fillStyle = divGrad;
    ectx.fillRect(pad, bottomY, paintW, 1);

    /* Title */
    ectx.fillStyle = '#c8aa78';
    ectx.font = '18px "PingFang SC", "Noto Serif SC", sans-serif';
    ectx.textAlign = 'center';
    ectx.fillText('禅意绘画', cardW / 2, bottomY + 26);

    /* Date */
    var now = new Date();
    var dateStr = now.getFullYear() + '.' + String(now.getMonth() + 1).padStart(2, '0') + '.' + String(now.getDate()).padStart(2, '0');
    ectx.fillStyle = '#706860';
    ectx.font = '12px "PingFang SC", "Noto Serif SC", sans-serif';
    ectx.fillText(dateStr + ' · ' + zenStrokes.length + ' 笔', cardW / 2, bottomY + 46);

    var link = document.createElement('a');
    link.download = '禅意绘画-' + Date.now() + '.png';
    link.href = expCv.toDataURL('image/png');
    link.click();

    var toast = document.getElementById('zenSaveToast');
    toast.classList.add('visible');
    setTimeout(function() { toast.classList.remove('visible'); }, 2000);
  });

  function saveGenerativeArt() {
    var tempCv = document.createElement('canvas');
    tempCv.width = W * 2; tempCv.height = H * 2;
    var tctx = tempCv.getContext('2d');

    /* Background */
    var season = SEASONS[currentSeason];
    var grad = tctx.createRadialGradient(W, H, 0, W, H, Math.max(W, H) * 0.7);
    grad.addColorStop(0, season.bgCenter);
    grad.addColorStop(1, season.bgEdge);
    tctx.fillStyle = grad;
    tctx.fillRect(0, 0, tempCv.width, tempCv.height);

    /* Particles */
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (p.opacity < 0.01) continue;
      tctx.globalAlpha = p.opacity;
      tctx.fillStyle = p.color;
      if (p.size > 1.5) { tctx.shadowColor = p.color; tctx.shadowBlur = p.size * 8; }
      tctx.beginPath();
      tctx.arc(p.x * 2, p.y * 2, p.size * 2, 0, Math.PI * 2);
      tctx.fill();
    }

    /* Title */
    tctx.shadowBlur = 0;
    tctx.globalAlpha = 0.6;
    tctx.fillStyle = '#c8aa78';
    tctx.font = '24px serif';
    tctx.textAlign = 'center';
    tctx.fillText('空白帧 — Blank Frame', W, H * 2 - 30);
    tctx.globalAlpha = 1;

    var link = document.createElement('a');
    link.download = 'blank-frame-' + Date.now() + '.png';

  /* ===== SHOOTING STARS ===== */
  var shootingStars = [];

  function spawnShootingStar() {
    var container = document.getElementById('mainSpace');
    if (currentScene !== 'main') return;

    var startY = Math.random() * H * 0.4;
    var startX = Math.random() * W * 0.3;
    var angle = 25 + Math.random() * 20;
    var speed = 8 + Math.random() * 6;
    var tailLen = 40 + Math.random() * 40;

    var el = document.createElement('div');
    el.className = 'shooting-star';
    el.innerHTML = '<div class="star-core"></div><div class="star-tail" style="width:' + tailLen + 'px"></div>';
    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.transform = 'rotate(' + angle + 'deg)';

    var star = {
      el: el, x: startX, y: startY,
      vx: Math.cos(angle * Math.PI / 180) * speed,
      vy: Math.sin(angle * Math.PI / 180) * speed,
      alive: true
    };

    el.addEventListener('click', function(e) {
      if (!star.alive) return;
      e.stopPropagation();
      star.alive = false;
      el.remove();
      wishCount++;
      updateEmotionCounter();
      createWishBurst(star.x, star.y);
    });

    container.appendChild(el);
    shootingStars.push(star);
    nextStarTime = 8000 + Math.random() * 20000;
  }

  function createWishBurst(x, y) {
    var colors = ['#c8aa78', '#fff', '#d8b888', '#a0c8b0', '#b89098', '#88a0b8'];
    for (var i = 0; i < 40; i++) {
      var angle = (Math.PI * 2 / 40) * i;
      var speed = 2 + Math.random() * 4;

    if (audioNodes.rain && audioNodes.rain.el) totalGain += audioNodes.rain.el.volume;

    waveCanvas.classList.add('active');
    var w = waveCanvas.width, h = waveCanvas.height;

    var bars = 30;
    var barWidth = w / bars - 1;
    var time = Date.now() / 1000;

    for (var i = 0; i < bars; i++) {
      var amplitude = totalGain * (0.3 + 0.7 * Math.sin(i * 0.4 + time * 2));

      var alpha = 0.1 + totalGain * 0.3;

    }

  }

    if (isNightHours() && !nightModeActive) {
      nightModeActive = true;
      /* Dim particles */
      particles.forEach(function(p) {
        p.opacity *= 0.6;

    ctx.fillStyle = '#06060b';
    ctx.fillRect(0, 0, W, H);

    var grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
    grad.addColorStop(0, season.bgCenter);
    grad.addColorStop(1, season.bgEdge);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

      drawRipples();

        updateShootingStars(dt);

        /* Floating emoji */
        nextEmojiTime -= dt;
        if (nextEmojiTime <= 0) spawnFloatingEmoji();

        /* Echo fragments */
        nextEchoTime -= dt;
        if (nextEchoTime <= 0) spawnEchoFragment();

        /* Time capsule check */
        checkTimeCapsules();

        /* Ambient pulse */
        updateAmbientPulse();

        /* Audio waveform */

        /* Silence milestone */
        checkSilenceMilestones();

        /* Mood chart */
        updateMoodChart();

        /* Night mode */
        checkNightMode();
      }
    } else if (currentScene === 'landing') {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.x += Math.sin(p.phase + timestamp*0.0003) * 0.05;
        p.y += Math.cos(p.phase + timestamp*0.0004) * 0.04;

        if (p.y < -m) p.y = H+m; if (p.y > H+m) p.y = -m;
